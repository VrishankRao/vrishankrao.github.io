<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HEX Color Picker</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --text: #f0f0f0;
      --muted: #555;
      --accent: #e8ff57;
      --picked: #e8ff57;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      padding: 40px 24px;
    }

    /* Header */
    .header {
      text-align: center;
    }

    .header h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
    }

    .header h1 span {
      color: var(--accent);
    }

    .header p {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Color swatch display */
    .swatch-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .swatch {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: var(--picked);
      border: 3px solid var(--border);
      transition: background 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 0 60px color-mix(in srgb, var(--picked) 40%, transparent);
      position: relative;
    }

    .swatch::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid color-mix(in srgb, var(--picked) 30%, transparent);
      transition: border-color 0.3s ease;
    }

    /* HEX display */
    .hex-display {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 20px;
      min-width: 240px;
      transition: border-color 0.3s ease;
    }

    .hex-display:hover {
      border-color: var(--accent);
    }

    .hex-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .hex-value {
      font-family: 'Space Mono', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.05em;
      flex: 1;
      text-align: center;
      transition: color 0.2s;
    }

    /* Pick button */
    .pick-btn {
      position: relative;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--accent);
      border: none;
      padding: 18px 48px;
      cursor: pointer;
      border-radius: 2px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.3s;
      box-shadow: 4px 4px 0px #fff1;
    }

    .pick-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px #fff2;
    }

    .pick-btn:active {
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0px #fff1;
    }

    .pick-btn.picking {
      background: #ff5757;
      color: #fff;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 4px 4px 0 #ff575740; }
      50% { box-shadow: 4px 4px 0 #ff575780, 0 0 30px #ff575740; }
    }

    /* History row */
    .history-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
    }

    .history {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 360px;
    }

    .history-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      position: relative;
    }

    .history-dot:hover {
      transform: scale(1.2);
      border-color: #fff4;
    }

    .history-dot[title]:hover::after {
      content: attr(title);
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      color: #eee;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      padding: 4px 8px;
      border-radius: 2px;
      white-space: nowrap;
      border: 1px solid #333;
      pointer-events: none;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: var(--bg);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 10px 24px;
      border-radius: 2px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Unsupported */
    .unsupported {
      display: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: #ff5757;
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
    }

    .divider {
      width: 1px;
      height: 40px;
      background: var(--border);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>COLOR<br/><span>PICK</span></h1>
    <p>Click anywhere on screen → get HEX</p>
  </div>

  <div class="swatch-area">
    <div class="swatch" id="swatch"></div>
    <div class="hex-display" id="hexDisplay" title="Click to copy">
      <span class="hex-label">HEX</span>
      <span class="hex-value" id="hexValue">#E8FF57</span>
    </div>
  </div>

  <button class="pick-btn" id="pickBtn">Pick Color</button>

  <p class="unsupported" id="unsupported">
    ⚠️ EyeDropper API not supported.<br/>
    Use Chrome or Edge for this tool.
  </p>

  <div>
    <p class="history-label" id="historyLabel" style="display:none">Recent picks</p>
    <div class="divider" id="divider" style="display:none; margin: 8px auto;"></div>
    <div class="history" id="history"></div>
  </div>
</div>

<div class="toast" id="toast">COPIED!</div>

<script>
  const pickBtn = document.getElementById('pickBtn');
  const swatch = document.getElementById('swatch');
  const hexValue = document.getElementById('hexValue');
  const hexDisplay = document.getElementById('hexDisplay');
  const historyEl = document.getElementById('history');
  const historyLabel = document.getElementById('historyLabel');
  const divider = document.getElementById('divider');
  const toast = document.getElementById('toast');
  const unsupported = document.getElementById('unsupported');

  let pickedColors = [];
  let currentHex = '#E8FF57';

  function setColor(hex) {
    currentHex = hex;
    swatch.style.background = hex;
    swatch.style.boxShadow = `0 0 60px color-mix(in srgb, ${hex} 40%, transparent)`;
    hexValue.textContent = hex.toUpperCase();
    document.documentElement.style.setProperty('--picked', hex);
  }

  function addToHistory(hex) {
    pickedColors = [hex, ...pickedColors.filter(c => c !== hex)].slice(0, 8);
    renderHistory();
  }

  function renderHistory() {
    if (pickedColors.length === 0) return;
    historyLabel.style.display = 'block';
    divider.style.display = 'block';
    historyEl.innerHTML = '';
    pickedColors.forEach(hex => {
      const dot = document.createElement('div');
      dot.className = 'history-dot';
      dot.style.background = hex;
      dot.title = hex.toUpperCase();
      dot.addEventListener('click', () => {
        setColor(hex);
        copyToClipboard(hex);
      });
      historyEl.appendChild(dot);
    });
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text.toUpperCase()).then(() => {
      showToast('COPIED ' + text.toUpperCase());
    });
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  // Click hex display to copy
  hexDisplay.addEventListener('click', () => copyToClipboard(currentHex));

  // Check EyeDropper support
  if (!window.EyeDropper) {
    pickBtn.disabled = true;
    pickBtn.style.opacity = '0.4';
    unsupported.style.display = 'block';
  }

  pickBtn.addEventListener('click', async () => {
    if (!window.EyeDropper) return;

    const eyeDropper = new EyeDropper();
    pickBtn.textContent = 'Picking...';
    pickBtn.classList.add('picking');

    try {
      const result = await eyeDropper.open();
      const hex = result.sRGBHex;
      setColor(hex);
      addToHistory(hex);
      copyToClipboard(hex);
    } catch (e) {
      // User cancelled — silent
    } finally {
      pickBtn.textContent = 'Pick Color';
      pickBtn.classList.remove('picking');
    }
  });
</script>
</body>
</html>
